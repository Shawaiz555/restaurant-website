<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with orange gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#grad)"/>

  <!-- Letter "B" in white -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="42" font-weight="bold"
        fill="white" stroke="#8B4513" stroke-width="1">B</text>

  <!-- Small burger accent on top right -->
  <circle cx="48" cy="16" r="8" fill="#DC143C"/>
  <path d="M 44 16 L 52 16" stroke="#FFD700" stroke-width="1.5"/>
  <path d="M 44 18 L 52 18" stroke="#8B4513" stroke-width="1"/>
</svg>
